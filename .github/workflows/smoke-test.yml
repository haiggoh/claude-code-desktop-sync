name: smoke-test

on: [push, pull_request]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.8", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Syntax check
        run: |
          python -m py_compile bin/sync_code_desktop.py install.py uninstall.py
      - name: Validate plugin/marketplace JSON
        run: |
          python -c "import json; json.load(open('.claude-plugin/plugin.json')); json.load(open('.claude-plugin/marketplace.json')); json.load(open('hooks/hooks.json')); print('manifests valid')"
      - name: Install (dry run)
        run: python install.py --dry-run
      - name: Functional test
        run: python tests/test_sync.py
